<div id="listing-{{ listing.listing_id }}"
     class="bg-emerald-500/8 border border-emerald-700/30 rounded-xl p-5 flex flex-col">
  <div class="flex items-start justify-between gap-2 mb-2">
    <h3 class="font-semibold text-gray-200 text-sm">{{ listing.title }}</h3>
    <span class="shrink-0 bg-emerald-500/15 text-emerald-400 text-xs font-medium px-2 py-0.5 rounded">Purchased</span>
  </div>
  {% if listing.description %}
  <p class="text-xs text-gray-500 mb-2">{{ listing.description }}</p>
  {% endif %}
  <p class="font-bold text-emerald-400">PKR {{ '{:,.0f}'.format(listing.price_pkr) }} paid</p>
  <p class="text-xs text-gray-500 mt-1">Seller: {{ listing.seller_name }}</p>
  <div class="mt-auto pt-3 border-t border-emerald-800/30 text-xs text-emerald-500 font-medium">
    Wallet balance: PKR {{ '{:,.2f}'.format(new_balance) }}
  </div>
</div>
