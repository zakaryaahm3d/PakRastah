{% extends 'base.html' %}
{% block title %}Sell an Item{% endblock %}
{% block content %}

<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <a href="{{ url_for('stubs.marketplace') }}" class="text-sm text-emerald-400 hover:underline">← Back to marketplace</a>
    <h1 class="text-2xl font-bold text-gray-100 mt-2">List an Item for Sale</h1>
    <p class="text-gray-500 text-sm mt-1">Give your second-hand item a second life.</p>
  </div>

  <div class="bg-[#151929] rounded-xl border border-gray-800 p-6">
    <form method="post" action="{{ url_for('stubs.create_listing') }}" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Item Title</label>
        <input type="text" name="title" required maxlength="255"
               placeholder="e.g. Wooden Study Table"
               class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                      placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">
          Description <span class="text-gray-600 font-normal">(optional)</span>
        </label>
        <textarea name="description" rows="3"
                  placeholder="Condition, any defects, why you're selling…"
                  class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                         placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Category</label>
          <select name="category" required
                  class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                         focus:outline-none focus:ring-2 focus:ring-emerald-500">
            <option value="" class="bg-[#0f1222]">Select…</option>
            {% for cat in ['clothing','electronics','furniture','books','appliances','materials','other'] %}
            <option value="{{ cat }}" class="bg-[#0f1222]">{{ cat|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">City</label>
          <input type="text" name="city" maxlength="100"
                 placeholder="e.g. Lahore"
                 class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                        placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Price (PKR)</label>
          <input type="number" name="price_pkr" required min="0" step="1"
                 placeholder="e.g. 5000"
                 class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                        placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Quantity</label>
          <input type="number" name="quantity" required min="1" value="1"
                 class="w-full bg-[#0f1222] border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200
                        focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
      </div>

      <div class="pt-2 flex gap-3">
        <button type="submit"
                class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold
                       py-2.5 rounded-lg text-sm transition">
          Post Listing
        </button>
        <a href="{{ url_for('stubs.marketplace') }}"
           class="flex-1 text-center border border-gray-700 text-gray-400 hover:bg-gray-800
                  font-medium py-2.5 rounded-lg text-sm transition">
          Cancel
        </a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
