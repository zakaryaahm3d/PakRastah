    <div>
      <p class="text-sm font-semibold text-red-300">Certification Denied</p>
      <p class="mt-1 text-xs text-inverse-on-surface-variant">Queue ID {{ queue_id }}</p>
    </div>
    <span class="inline-flex items-center gap-2 rounded-full bg-red-500/15 px-3 py-1 text-xs font-semibold text-red-200">
      <span class="material-symbols-outlined">block</span>
