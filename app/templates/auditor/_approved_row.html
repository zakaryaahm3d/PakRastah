<div id="cert-row-{{ queue_id }}"
     class="bg-emerald-500/10 border border-emerald-700/40 rounded-xl p-6">
  <div class="flex items-center gap-3">
    <span class="text-2xl">✅</span>
    <div>
      <p class="font-semibold text-emerald-300">Certification Approved</p>
      <p class="text-sm text-emerald-400">
        Cert # <span class="font-mono">{{ cert_number }}</span> issued —
        <span class="font-medium capitalize">{{ tier }}</span> tier
      </p>
      <p class="text-xs text-emerald-600 mt-1">
        Run <code class="bg-[#0f1222] px-1 rounded">apply_monthly_tax_credits()</code> from the Developer Panel to issue the tax credit.
      </p>
    </div>
  </div>
</div>
